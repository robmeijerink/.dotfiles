# =========================================================
# Alacritty Configuration - Rob Meijerink
# =========================================================

# Gebruik relatieve paden voor cross-platform compatibiliteit
import = [
    "~/.config/alacritty/appearance.toml",
    "~/.config/alacritty/alacritty.local.toml"
]

[window]
# Nuchtere window instellingen
padding = { x = 10, y = 10 }
dynamic_padding = true
decorations = "full"
startup_mode = "Maximized"

[scrolling]
history = 10000
multiplier = 3

[selection]
save_to_clipboard = true
semantic_escape_chars = ",│`|:\"' ()[]{}<>"

[cursor]
style = { shape = "Block", blinking = "On" }
unfocused_hollow = true

# =========================================================
# KEYBINDINGS
# =========================================================

[[keyboard.bindings]]
key = "Key0"
mods = "Control"
action = "ResetFontSize"

[[keyboard.bindings]]
key = "Equals"
mods = "Control"
action = "IncreaseFontSize"

[[keyboard.bindings]]
key = "Minus"
mods = "Control"
action = "DecreaseFontSize"

[[keyboard.bindings]]
key = "N"
mods = "Control|Shift"
action = "SpawnNewInstance"

# De "Rob Meijerink Special": Directe tunnel naar je sessionizer
[[keyboard.bindings]]
key = "F"
mods = "Control|Shift"
chars = "t\r"

# =========================================================
# HINTS (URL & Path opener)
# =========================================================
# Ctrl+Shift+U to open URL in browser
[[hints.enabled]]
command = "xdg-open" # Gebruik "open" op macOS (regel dit via alacritty.local.toml)
hyperlinks = true
post_processing = true
regex = "(ipfs:|ipns:|magnet:|mailto:|gemini:|gopher:|https:|http:|news:|file:|git:|ssh:|ftp:)[^\u0000-\u001F\u007F-\u009F<>\"\\s{-}\\^⟨⟩`]+"
binding = { key = "U", mods = "Control|Shift" }
mouse = { enabled = true, mods = "None" }
