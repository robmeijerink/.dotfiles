# =========================================================
# -- SERVER & TERMINAL SETTINGS
# =========================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",$TERM:RGB"

# Undercurl & Cursor support (Alacritty / Neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

set -sg escape-time 0
set -g focus-events on
set -g history-limit 12000
set -g mouse on
set -g detach-on-destroy off

# =========================================================
# -- UI & STATUSLINE
# =========================================================
set -g status-style 'bg=terminal fg=#5eacd3'
set -g status-right '#(TZ="Europe/Amsterdam" date +"#H %%H:%%M %%d-%%h-%y")'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g set-titles on

setw -g monitor-activity on
set -g visual-bell off
set -g visual-activity off

# =========================================================
# -- KEYBINDINGS (Rob Meijerink Architecture)
# =========================================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Window Navigation
bind -r n next-window
bind -r p previous-window
bind Space last-window
bind b switch-client -l

# Native Window Swapping (O(1) performance)
bind -r N swap-window -t +1\; select-window -t +1
bind -r P swap-window -t -1\; select-window -t -1

# Integrations
bind -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Pane Navigation (Alt + Arrows)
bind -n M-Left select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up select-pane -U
bind -n M-Down select-pane -D

# Window Navigation (Shift + Arrows)
bind -n S-Left previous-window
bind -n S-Right next-window

# =========================================================
## -- VIM INTEGRATION & CLIPBOARD (Wayland / macOS / X11)
# =========================================================
setw -g mode-keys vi

# Smart pane switching (Vim aware)
is_vim='echo "#{pane_current_command}" | grep -iqE "(^|\/)g?(view|n?vim?)(diff)?$"'
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Cross-platform Clipboard Logic
# 1. macOS (Darwin) -> pbcopy
# 2. Wayland (Ubuntu) -> wl-copy
# 3. X11 (Fallback) -> xclip
if-shell "uname | grep -q Darwin" \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'if-shell "[ -n \"$WAYLAND_DISPLAY\" ]" \
        "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
        "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xclip -in -selection clipboard\""'

bind -T copy-mode-vi v send-keys -X begin-selection
