# =========================================================
# -- SERVER & TERMINAL SETTINGS
# =========================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",$TERM:RGB"

# Undercurl & Cursor support (Alacritty / Neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

set -sg escape-time 0
set -g focus-events on
set -g history-limit 12000
set -g mouse on
set -g detach-on-destroy off
set -g status-interval 5

# =========================================================
# -- UI & STATUSLINE
# =========================================================
set -g status-style 'bg=terminal fg=#5eacd3'
set -g status-right '#(TZ="Europe/Amsterdam" date +"#H %%H:%%M %%d-%%h-%y")'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g set-titles on

setw -g monitor-activity on
set -g visual-bell off
set -g visual-activity off

# =========================================================
# -- KEYBINDINGS
# =========================================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation
bind Space last-window
bind b switch-client -l

# Integrations
bind-key -n C-f new-window "zsh -ic '$HOME/.local/scripts/tmux-sessionizer'"

# Pane Resizing (Alt + Shift + Arrows)
bind -r M-S-Up resize-pane -U 5
bind -r M-S-Down resize-pane -D 5
bind -r M-S-Left resize-pane -L 5
bind -r M-S-Right resize-pane -R 5

# Window Navigation (Shift + Arrows)
bind -n S-Left previous-window
bind -n S-Right next-window

# =========================================================
# -- CLIPBOARD & MODE-KEYS
# =========================================================
setw -g mode-keys vi

# macOS Clipboard
if-shell 'uname | grep -q Darwin' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"'

# Linux Clipboard (Wayland)
if-shell 'uname | grep -q Linux && [ -n "$WAYLAND_DISPLAY" ]' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "wl-copy"'

# Linux Clipboard (X11)
if-shell 'uname | grep -q Linux && [ -z "$WAYLAND_DISPLAY" ]' \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"'

bind -T copy-mode-vi v send-keys -X begin-selection

# =========================================================
# -- PLUGINS (TPM)
# =========================================================
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Restore Clear Screen functionality (handled by navigator plugin)
bind C-l send-keys 'C-l'

# Plugin settings
set -g @continuum-restore 'on'
set -g @resurrect-strategy-nvim 'session'

# Initialize TPM (Must be at the very bottom)
run '~/.tmux/plugins/tpm/tpm'
