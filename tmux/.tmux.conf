# =========================================================
# -- SERVER & TERMINAL SETTINGS
# =========================================================
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",$TERM:RGB"

# Undercurl & Cursor support (Alacritty / Neovim)
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'
set -ga terminal-overrides '*:Ss=\E[%p1%d q:Se=\E[ q'

set -sg escape-time 0
set -g focus-events on
set -g history-limit 12000
set -g mouse on
set -g detach-on-destroy off
set -g status-interval 5

# =========================================================
# -- UI & STATUSLINE
# =========================================================
set -g status-style 'bg=terminal fg=#5eacd3'
set -g status-right '#(TZ="Europe/Amsterdam" date +"#H %%H:%%M %%d-%%h-%y")'

set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g allow-rename on
set -g set-titles on

setw -g monitor-activity on
set -g visual-bell off
set -g visual-activity off

# =========================================================
# -- KEYBINDINGS (Rob Meijerink)
# =========================================================
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

bind r source-file ~/.tmux.conf \; display "Config Reloaded!"

# Splits (open in current path)
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# Navigation
bind Space last-window
bind b switch-client -l

# Integrations
bind -r f run-shell "tmux neww ~/.local/bin/tmux-sessionizer"

# Pane Resizing (Alt + Shift + Arrows) - Repeatable $O(1)$ control
bind -r M-S-Up resize-pane -U 5
bind -r M-S-Down resize-pane -D 5
bind -r M-S-Left resize-pane -L 5
bind -r M-S-Right resize-pane -R 5

# Window Navigation (Shift + Arrows)
bind -n S-Left previous-window
bind -n S-Right next-window

# =========================================================
## -- VIM INTEGRATION & CLIPBOARD
# =========================================================
setw -g mode-keys vi

# Smart pane switching (Vim aware)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

# Cross-platform Clipboard (macOS / Wayland / X11)
if-shell "uname | grep -q Darwin" \
    'bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "pbcopy"' \
    'if-shell "[ -n \"$WAYLAND_DISPLAY\" ]" \
        "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"wl-copy\"" \
        "bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel \"xclip -in -selection clipboard\""'

bind -T copy-mode-vi v send-keys -X begin-selection