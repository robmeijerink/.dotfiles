# =========================================================
# Lazygit Configuration - Updated for v0.40+
# =========================================================

gui:
  language: "en"
  nerdFontsVersion: "3"
  showIcons: true
  theme:
    activeBorderColor:
      - "#5eacd3"
      - bold
    inactiveBorderColor:
      - "#333333"
    searchingActiveBorderColor:
      - "#ffb86c" # Dracula orange

git:
  disableForcePushing: true
  parseEmoji: true

  # NEW SYNTAX: Replaces 'pagers'
  paging:
    colorArg: always
    pager: delta --dark --paging=never --hyperlinks --line-numbers --syntax-theme=Dracula

  commit:
    signOff: false

  # Optimized log view
  allBranchesLogCmds:
    - "git log --graph --all --color=always --abbrev-commit --date=relative --pretty=format:'%Cred%h%Creset -%C(yellow)%d%Creset %s %Cgreen(%cr) %C(bold blue)<%an>%Creset'"

os:
  edit: "nvim {{filename}}"
  editAtLine: "nvim +{{line}} {{filename}}"

customCommands:
  - key: "F"
    command: "git commit --fixup {{.SelectedLocalCommit.Hash}}"
    context: "commits"
    description: "Fixup commit (auto-squash ready)"
    loadingText: "Fixing up..."
  - key: "L"
    command: "git push --force-with-lease"
    context: "global"
    description: "Safe force push (with lease)"
    loadingText: "Pushing safely..."
